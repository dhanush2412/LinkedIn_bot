<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>JobHunt</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 12px; font-size: 13px; color: #1a1a1a; }

    pre { white-space: pre-wrap; background: #f5f5f5; padding: 8px; border-radius: 4px; font-size: 12px; }

    .qa .q { font-weight: 600; color: #555; }
    .needs-human { color: #b00020; font-weight: 600; }
  </style>
</head>
<body>
  <h2>Cover letter</h2>

  <h2>Tailored resume</h2>
  <a id="pdf" class="btn" href="#" target="_blank" style="display:none;">Open PDF</a>
  <h2>Form answers</h2>
  <div id="answers"></div>
  <script src="sidepanel.js"></script>

</html>
